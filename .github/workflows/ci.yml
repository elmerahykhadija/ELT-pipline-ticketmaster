name: CI ELT Ticketmaster

# Se déclenche quand tu pousses du code sur "main"
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  verification-et-build:
    runs-on: ubuntu-latest

    steps:
    # 1. Récupérer ton code depuis GitHub
    - name: Récupération du code
      uses: actions/checkout@v3

    # 2. Installer Python 3.12 
    - name: Configuration de Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'

    # 3. Vérifier qu'il n'y a pas d'erreurs fatales dans tes scripts et tes DAGs
    - name: Vérification du code Python (Linting)
      run: |
        python -m pip install --upgrade pip
        pip install flake8
        # Vérifie les dossiers scripts/ et dags/
        flake8 scripts/ dags/ --count --select=E9,F63,F7,F82 --show-source --statistics

    # 4. Tester que Docker 
    - name: Test de construction Docker (Build)
      run: |
        # On utilise le chemin exact vers ton fichier docker-compose
        docker compose -f Docker/docker-compose.yml build
