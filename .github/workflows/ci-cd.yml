name: CI/CD ELT Ticketmaster

on:
  push:
    branches:
      - main

jobs:
  # --- 1. INTÉGRATION CONTINUE (CI) ---
  verification-et-build:
    runs-on: ubuntu-latest
    steps:
    - name: Récupération du code
      uses: actions/checkout@v3

    - name: Configuration de Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'

    - name: Vérification du code Python (Linting)
      run: |
        python -m pip install --upgrade pip
        pip install flake8
        flake8 scripts/ dags/ --count --select=E9,F63,F7,F82 --show-source --statistics

    - name: Test de construction Docker
      run: docker compose -f Docker/docker-compose.yml build

  # --- 2. DÉPLOIEMENT CONTINU (CD) ---
  deploiement-production:
    needs: verification-et-build # Attend que le CI soit réussi
    runs-on: ubuntu-latest
    
    steps:
    - name: Déploiement sur AWS EC2 via SSH
      uses: appleboy/ssh-action@v1.0.0
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USERNAME }}
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          # Cloner le projet s'il n'existe pas, ou le mettre à jour s'il existe
          if [ ! -d "ELT-pipline-ticketmaster" ]; then
            git clone https://github.com/elmerahykhadija/ELT-pipline-ticketmaster.git
          fi
          
          cd ELT-pipline-ticketmaster
          git pull origin main
          
          # Lancement des conteneurs
          docker compose -f Docker/docker-compose.yml down
          docker compose -f Docker/docker-compose.yml up -d --build
